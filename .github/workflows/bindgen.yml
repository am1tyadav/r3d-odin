name: Update Bindings

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout r3d-odin repository
        uses: actions/checkout@v4

      # === Check for new bindgen run =====================================

      - name: Check for new successful run in r3d-odin-bindgen
        id: check
        run: |
          RESPONSE=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/Bigfoot71/r3d-odin-bindgen/actions/workflows/generate-binding.yml/runs?status=success&branch=master&per_page=1")

          LATEST_RUN_ID=$(echo "$RESPONSE" | jq -r '.workflow_runs[0].id')
          LATEST_SHA=$(echo "$RESPONSE" | jq -r '.workflow_runs[0].head_sha')
          LAST_RUN_ID=$(cat .last-bindgen-run-id 2>/dev/null || echo "")

          echo "latest_run_id=$LATEST_RUN_ID" >> $GITHUB_OUTPUT
          echo "latest_sha=$LATEST_SHA" >> $GITHUB_OUTPUT
          echo "changed=$( [ "$LATEST_RUN_ID" != "$LAST_RUN_ID" ] && echo true || echo false )" >> $GITHUB_OUTPUT

      - name: No new bindgen run detected
        if: steps.check.outputs.changed == 'false'
        run: echo "r3d-odin-bindgen has not produced a new run since last update, skipping."

      # === Download & update ============================================

      - name: Clean existing bindings
        if: steps.check.outputs.changed == 'true'
        run: |
          rm -rf r3d/
          mkdir -p r3d/

      - name: Download bindings artifact
        if: steps.check.outputs.changed == 'true'
        uses: dawidd6/action-download-artifact@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: bindgen.yml
          repo: Bigfoot71/r3d-odin-bindgen
          name: r3d-odin-bindings
          path: r3d/
          run_id: ${{ steps.check.outputs.latest_run_id }}

      - name: Check for changes
        if: steps.check.outputs.changed == 'true'
        id: changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      # === Test =========================================================

      - name: Setup Odin
        if: steps.check.outputs.changed == 'true' && steps.changes.outputs.has_changes == 'true'
        uses: laytan/setup-odin@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release: latest

      - name: Test all examples
        if: steps.check.outputs.changed == 'true' && steps.changes.outputs.has_changes == 'true'
        run: |
          odin check examples/animation.odin -file
          odin check examples/basic.odin -file
          odin check examples/billboards.odin -file
          odin check examples/bloom.odin -file
          odin check examples/decal.odin -file
          odin check examples/dof.odin -file
          odin check examples/instanced.odin -file
          odin check examples/kinematics.odin -file
          odin check examples/lights.odin -file
          odin check examples/particles.odin -file
          odin check examples/pbr.odin -file
          odin check examples/probe.odin -file
          odin check examples/resize.odin -file
          odin check examples/shader.odin -file
          odin check examples/skybox.odin -file
          odin check examples/sprite.odin -file
          odin check examples/sun.odin -file
          odin check examples/transparency.odin -file

      # === Commit =======================================================

      - name: Commit and push
        if: steps.check.outputs.changed == 'true' && steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "${{ steps.check.outputs.latest_run_id }}" > .last-bindgen-run-id
          git add .last-bindgen-run-id r3d/
          git commit -m "Update bindings from r3d-odin-bindgen@${{ steps.check.outputs.latest_sha }}"
          git push origin master

      - name: No changes detected
        if: steps.check.outputs.changed == 'true' && steps.changes.outputs.has_changes == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "${{ steps.check.outputs.latest_run_id }}" > .last-bindgen-run-id
          git add .last-bindgen-run-id
          git commit -m "chore: track bindgen run ${{ steps.check.outputs.latest_run_id }}" || echo "Nothing to commit"
          git push origin master || echo "Nothing to push"
